name: "Security vulnerability scan"

on:
  workflow_call:
    inputs:
      ref:
        description: Branch, tag or SHA to scan.
        type: string
        required: false
        default: ""

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  go-config:
    name: Go scanner config
    runs-on: ubuntu-latest
    steps:
      - name: Set up Go
        uses: actions/setup-go@0aaccfd150d50ccaeb58ebd88d36e91967a5f35b # v5.4.0
        with:
          go-version: stable
          cache: false
          check-latest: true
      - name: Create OSV-Scanner config
        run: |
          echo "GoVersionOverride = '$(go env GOVERSION | sed -e 's/^go//' -e 's/-.*$//')'" > osv-scanner.toml
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: go-config
          path: osv-scanner.toml
          if-no-files-found: error

  go:
    needs: go-config
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@bd2db87dbf1ac35ea9daf558e69468ec000f3ee9
    with:
      ref: ${{ inputs.ref }}
      download-artifact: go-config
      matrix-property: "go-"
      scan-args: |
        --config=osv-scanner.toml
        --lockfile=go.mod

  node-bom:
    name: Node BOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.ref }}
      - name: Set up Node
        uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version: "lts/*"
      - name: Create BOM
        working-directory: node
        run: |
          npm install --omit=dev --package-lock-only --no-audit
          npm sbom --omit=dev --package-lock-only --sbom-format cyclonedx > ../bom.cdx.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: node-bom
          path: bom.cdx.json
          if-no-files-found: error

  node:
    needs: node-bom
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@bd2db87dbf1ac35ea9daf558e69468ec000f3ee9
    with:
      ref: ${{ inputs.ref }}
      download-artifact: node-bom
      matrix-property: "node-"
      scan-args: |
        --sbom=bom.cdx.json

  java:
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@bd2db87dbf1ac35ea9daf558e69468ec000f3ee9
    with:
      ref: ${{ inputs.ref }}
      matrix-property: "java-"
      scan-args: |
        --lockfile=java/pom.xml
